# ====================================================================
# AVD Configuration Template for Software Rendering
# ====================================================================
# This file contains settings to add/modify in your AVD config.ini file
# Location: %USERPROFILE%\.android\avd\<AVD_NAME>.avd\config.ini
# 
# Instructions:
# 1. Navigate to: C:\Users\<YourUsername>\.android\avd\
# 2. Find your AVD folder (e.g., Pixel_5_API_33.avd)
# 3. Open config.ini in a text editor
# 4. Add or modify the following settings
# ====================================================================

# Disable GPU hardware acceleration
hw.gpu.enabled = no
hw.gpu.mode = software

# Alternatively, use one of these modes for better compatibility:
# hw.gpu.mode = guest
# hw.gpu.mode = swiftshader_indirect
# hw.gpu.mode = angle_indirect

# Reduce RAM allocation for better VM performance (optional)
# hw.ramSize = 2048

# Use software keyboard instead of physical keyboard
# hw.keyboard = no

# Disable camera if not needed (improves performance)
# hw.camera.back = none
# hw.camera.front = none

# Optimize disk settings
disk.dataPartition.size = 2048M

# Screen density (adjust based on your needs)
# hw.lcd.density = 420

# ====================================================================
# Additional Performance Settings
# ====================================================================

# Disable boot animation for faster startup
# fastboot.forceFastBoot = yes

# Disable snapshot for consistent state
# snapshot.present = no

# ====================================================================
# Notes:
# - After making changes, restart the emulator completely
# - Some settings may need both the AVD to be closed and Android Studio restarted
# - Test the emulator after each change to verify improvements
# ====================================================================
